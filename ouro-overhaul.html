<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Ouroborus — overhaul</title>
<style>
  :root { --bg:#0d1117; --bg2:#161b22; --fg:#c9d1d9; --dim:#8b949e; --grid:#21262d;
          --blue:#58a6ff; --green:#3fb950; --amber:#e3b341; --red:#f85149; --gold:#ffd33d; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--fg); font:14px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; padding:14px; max-width:560px; margin:0 auto; }
  h1 { font-size:15px; letter-spacing:.06em; color:var(--dim); display:flex; justify-content:space-between; align-items:center; }
  .pill { font-size:11px; padding:2px 8px; border-radius:10px; background:var(--bg2); border:1px solid var(--grid); }
  .pill.stale { color:var(--red); border-color:var(--red); }
  .nav { display:flex; gap:6px; margin-top:10px; }
  .nav a { flex:1; text-align:center; text-decoration:none; background:var(--bg2); color:var(--dim); border:1px solid var(--grid); border-radius:8px; padding:7px; font-size:12px; }
  .nav a.active { color:var(--fg); border-color:var(--blue); }
  .card { background:var(--bg2); border:1px solid var(--grid); border-radius:10px; padding:12px; margin-top:12px; }
  .banner { border-color:var(--gold); color:var(--gold); font-weight:bold; text-align:center; }
  .paused { border-color:var(--amber); color:var(--amber); font-weight:bold; text-align:center; }
  .l { color:var(--dim); font-size:11px; letter-spacing:.08em; }
  .bignums { display:flex; gap:10px; }
  .bignums div { flex:1; text-align:center; }
  .bignums .v { font-size:26px; font-weight:bold; }
  .bignums .lab { font-size:10px; color:var(--dim); letter-spacing:.08em; }
  .bar { height:8px; background:var(--bg); border-radius:4px; margin-top:8px; overflow:hidden; }
  .bar i { display:block; height:100%; background:var(--green); transition:width .4s linear; }
  .small { font-size:11px; color:var(--dim); margin-top:4px; }
  .wk { margin-top:8px; padding:10px; border:1px solid var(--grid); border-radius:8px; }
  .wk .nm { font-weight:bold; }
  .stat-ready { color:var(--green); } .stat-warn { color:var(--amber); } .stat-off { color:var(--red); }
  .gbar { height:6px; background:var(--bg); border-radius:3px; margin-top:6px; overflow:hidden; }
  .gbar i { display:block; height:100%; background:var(--blue); }
  .frow { display:flex; align-items:center; gap:8px; padding:5px 0; border-bottom:1px solid var(--grid); font-size:12.5px; }
  .frow:last-child { border-bottom:none; }
  .frow .fn { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .frow .fb { flex:0 0 90px; height:6px; background:var(--bg); border-radius:3px; overflow:hidden; }
  .frow .fb i { display:block; height:100%; background:var(--green); }
  .frow .fc { flex:0 0 auto; color:var(--dim); font-size:11px; }
  footer { color:var(--grid); font-size:10px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<h1>OUROBORUS · OVERHAUL <span id="upd" class="pill">loading…</span></h1>
<div class="nav">
  <a href="ouro-overhaul.html" class="active">Overview</a>
  <a href="ouro-library.html">Library</a>
  <a href="ouro-core.html">Core</a>
</div>

<div id="banner" class="card banner" style="display:none"></div>
<div class="card paused">⏸ SEARCH PAUSED — overhaul / library build in progress</div>

<div class="card">
  <div class="l">EXPERTS BUILT</div>
  <div class="bignums">
    <div><div class="v" id="edone">—</div><div class="lab">DONE</div></div>
    <div><div class="v" id="etotal">—</div><div class="lab">TOTAL</div></div>
    <div><div class="v" id="skills">—</div><div class="lab">SKILLS</div></div>
  </div>
  <div class="bar"><i id="ebar" style="width:0%"></i></div>
  <div class="small" id="epct"></div>
</div>

<div class="card">
  <div class="l">BY FIELD <span style="opacity:.5">· top by total</span></div>
  <div id="fields"></div>
</div>

<div class="card">
  <div class="l">CLUSTER</div>
  <div id="workers"></div>
</div>

<div class="card">
  <div class="l">CORE</div>
  <div id="core" class="small"></div>
</div>

<footer><span id="pagever">overhaul page · overview + cluster · polls overhaul.json ~20s</span></footer>
<script>
const RAW = "https://raw.githubusercontent.com/gabe9230/gabe9230.github.io/data/overhaul.json";
function ago(s){ return s<90 ? Math.round(s)+"s" : s<5400 ? Math.round(s/60)+"m" : Math.round(s/3600)+"h"; }
function esc(t){ const d=document.createElement("div"); d.textContent=(t==null?"":t); return d.innerHTML; }
function num(v){ return (v==null||isNaN(v)) ? "—" : v; }

function renderFields(lib){
  const el = document.getElementById("fields");
  const bf = (lib && lib.by_field) || null;
  if(!bf || !Object.keys(bf).length){ el.innerHTML = "<div class='small'>no field data</div>"; return; }
  const rows = Object.entries(bf)
    .map(([name,v])=>({ name, total:(v&&v.total)||0, done:(v&&v.done)||0 }))
    .sort((a,b)=> b.total - a.total)
    .slice(0,10)
    .map(f=>{
      const pct = f.total>0 ? Math.min(100, 100*f.done/f.total) : 0;
      return `<div class="frow"><span class="fn">${esc(f.name)}</span>`
        + `<span class="fb"><i style="width:${pct}%"></i></span>`
        + `<span class="fc">${f.done}/${f.total}</span></div>`;
    }).join("");
  el.innerHTML = rows;
}

function renderWorkers(cl){
  const el = document.getElementById("workers");
  const ws = (cl && cl.workers) || [];
  if(!ws.length){ el.innerHTML = "<div class='small'>no workers reporting</div>"; return; }
  const nowS = Date.now()/1000;
  const rows = ws.map(w=>{
    const g = (w.gpus && w.gpus[0]) || {};
    const util = g.util, temp = g.temp;
    const offish = (w.status && /off|down|stale/i.test(w.status));
    const sc = offish ? "stat-off" : (w.status==="ready"||w.status==="running") ? "stat-ready" : "stat-warn";
    const tcol = (temp!=null && temp>=83)?"var(--red)":(temp!=null && temp>=75)?"var(--amber)":"var(--dim)";
    const memStr = (g.mem_used!=null||g.mem_total!=null) ? `${num(g.mem_used)}/${num(g.mem_total)} MiB` : "";
    const caps = (w.capabilities||[]).join(",");
    const job = w.current_job ? `<div class="small" style="margin-top:3px;color:var(--amber)">job ${esc(w.current_job)}</div>`
                              : `<div class="small" style="margin-top:3px;color:var(--dim)">idle — no job</div>`;
    return `<div class="wk"><div class="nm">${esc(w.id||"?")} `
      + `<span class="${sc}">● ${esc(w.status||"?")}</span>`
      + (w.host?` <span style="color:var(--dim);font-weight:normal;font-size:11px">${esc(w.host)}</span>`:"")
      + `</div>`
      + `<div class="gbar"><i style="width:${util||0}%"></i></div>`
      + `<div class="small">gpu ${num(util)}% · <span style="color:${tcol}">${num(temp)}°C</span>`
      + (memStr?` · ${memStr}`:"")
      + (caps?` · ${esc(caps)}`:"") + `</div>`
      + job + `</div>`;
  }).join("");
  const queued = (cl&&cl.queued)!=null ? cl.queued : "—";
  const running = (cl&&cl.running)!=null ? cl.running : "—";
  const summary = `<div class="small" style="margin-top:6px">queue <b>${queued}</b> · running <b>${running}</b></div>`;
  el.innerHTML = rows + summary;
}

async function load(){
  let d;
  try {
    const r = await fetch(RAW + "?t=" + Date.now(), {cache:"no-store"});
    d = await r.json();
  } catch(e){
    document.getElementById("upd").textContent = "fetch failed";
    document.getElementById("upd").className = "pill stale";
    return;
  }
  const upd = document.getElementById("upd");
  if (d && d.ts){
    const age = Date.now()/1000 - d.ts;
    upd.textContent = "data " + ago(age) + " old";
    upd.className = "pill" + (age > 300 ? " stale" : "");
  } else {
    upd.textContent = "no ts";
    upd.className = "pill stale";
  }

  // mode banner
  const bn = document.getElementById("banner");
  if (d && d.mode){ bn.style.display=""; bn.textContent = "■ " + d.mode; }
  else { bn.style.display="none"; }

  // big stats
  const lib = (d && d.library) || {};
  const done = lib.experts_done, total = lib.experts_total;
  document.getElementById("edone").textContent = num(done);
  document.getElementById("etotal").textContent = num(total);
  document.getElementById("skills").textContent = num(lib.skills);
  const pct = (total>0 && done!=null) ? Math.min(100, 100*done/total) : 0;
  document.getElementById("ebar").style.width = pct + "%";
  document.getElementById("epct").textContent =
    (total>0 && done!=null) ? pct.toFixed(1) + "% of experts built" : "";

  renderFields(lib);
  renderWorkers((d && d.cluster) || {});

  // core
  const core = (d && d.core) || {};
  const coreEl = document.getElementById("core");
  const tcol = core.trained ? "var(--green)" : "var(--amber)";
  const tstr = core.trained==null ? "—" : (core.trained ? "trained" : "not trained");
  coreEl.innerHTML = `core: <b style="color:${tcol}">${tstr}</b>`
    + (core.note ? `<div class="small" style="margin-top:3px">${esc(core.note)}</div>` : "");
}
load();
setInterval(load, 20000);
</script>
</body>
</html>
