<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Ouroborus — live</title>
<style>
  :root { --bg:#0d1117; --bg2:#161b22; --fg:#c9d1d9; --dim:#8b949e; --grid:#21262d;
          --blue:#58a6ff; --green:#3fb950; --amber:#e3b341; --red:#f85149; --gold:#ffd33d; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--fg); font:14px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; padding:14px; max-width:560px; margin:0 auto; }
  h1 { font-size:15px; letter-spacing:.06em; color:var(--dim); display:flex; justify-content:space-between; align-items:center; }
  .pill { font-size:11px; padding:2px 8px; border-radius:10px; background:var(--bg2); border:1px solid var(--grid); }
  .pill.stale { color:var(--red); border-color:var(--red); }
  .card { background:var(--bg2); border:1px solid var(--grid); border-radius:10px; padding:12px; margin-top:12px; }
  .banner { border-color:var(--gold); color:var(--gold); font-weight:bold; text-align:center; }
  .bignums { display:flex; gap:10px; }
  .bignums div { flex:1; text-align:center; }
  .bignums .v { font-size:26px; font-weight:bold; }
  .bignums .l { font-size:10px; color:var(--dim); letter-spacing:.08em; }
  .gap-good { color:var(--green); } .gap-bad { color:var(--red); }
  canvas { width:100%; height:120px; margin-top:8px; }
  .row { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--grid); font-size:12.5px; gap:8px; }
  .row:last-child { border-bottom:none; }
  .row .ops { color:var(--dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
  .wk { margin-top:8px; padding:10px; border:1px solid var(--grid); border-radius:8px; }
  .wk .nm { font-weight:bold; }
  .bar { height:8px; background:var(--bg); border-radius:4px; margin-top:6px; overflow:hidden; }
  .bar i { display:block; height:100%; background:var(--blue); }
  .small { font-size:11px; color:var(--dim); margin-top:4px; }
  .stat-ready { color:var(--green); } .stat-warn { color:var(--amber); } .stat-off { color:var(--red); }
  footer { color:var(--grid); font-size:10px; text-align:center; margin-top:18px; }
  .erow { cursor:pointer; }
  .erow:active, .erow:hover { background:var(--bg); }
  .pager { display:flex; justify-content:space-between; align-items:center; gap:8px; padding:4px 0 8px; font-size:11px; color:var(--dim); }
  .pager button { background:var(--bg); color:var(--fg); border:1px solid var(--grid); border-radius:6px; padding:4px 10px; font:inherit; font-size:11px; cursor:pointer; }
  .pager button:disabled { opacity:.35; cursor:default; }
  .sheet-overlay { position:fixed; inset:0; background:rgba(0,0,0,.65); display:flex; align-items:center; justify-content:center; padding:16px; z-index:50; }
  .sheet-card { background:var(--bg2); border:1px solid var(--grid); border-radius:12px; padding:16px; max-width:520px; width:100%; max-height:85vh; overflow:auto; }
  .shh { font-size:14px; margin-bottom:8px; word-break:break-word; color:var(--amber); }
  .srow { display:flex; justify-content:space-between; gap:12px; padding:5px 0; border-bottom:1px solid var(--grid); font-size:12.5px; }
  .srow:last-child { border-bottom:none; }
  .srow .sk { color:var(--dim); flex-shrink:0; }
  .srow .sv { text-align:right; word-break:break-word; }
  .sclose { margin-top:14px; width:100%; background:var(--bg); color:var(--fg); border:1px solid var(--grid); border-radius:8px; padding:9px; font:inherit; cursor:pointer; }
</style>
</head>
<body>
<h1>OUROBORUS <span id="upd" class="pill">loading…</span></h1>
<div id="banner" class="card banner" style="display:none"></div>
<div class="card">
  <div class="bignums">
    <div><div class="v" id="best">—</div><div class="l">BEST SKILL</div></div>
    <div><div class="v" id="gate">—</div><div class="l">LEVEL</div></div>
    <div><div class="v" id="ppl">—</div><div class="l">CHAMPION LOSS</div></div>
  </div>
  <div class="small" id="phase"></div>
  <div class="small" id="thr"></div>
  <canvas id="spark" width="600" height="150"></canvas>
  <div class="small" id="sparkleg" style="text-align:center"></div>
</div>
<div class="card"><div class="l" style="color:var(--dim);font-size:11px;letter-spacing:.08em">COMPOUNDING ENGINE</div><div id="compound" class="small"></div></div>
<div class="card"><div class="l" style="color:var(--dim);font-size:11px;letter-spacing:.08em">RECENT EVALS</div><div id="evals"></div></div>
<div class="card"><div class="l" style="color:var(--dim);font-size:11px;letter-spacing:.08em">CLUSTER</div><div id="workers"></div></div>
<div id="sheet" class="sheet-overlay" style="display:none" onclick="closeSheet(event)"><div class="sheet-card" id="sheetbody"></div></div>
<footer>private page — unlinked, noindex · <span id="pagever">v8 · eval pages + data sheet</span></footer>
<script>
const SRC = "https://raw.githubusercontent.com/gabe9230/gabe9230.github.io/data/status.json";
function ago(s){ return s<90 ? Math.round(s)+"s" : s<5400 ? Math.round(s/60)+"m" : Math.round(s/3600)+"h"; }
function esc(t){ const d=document.createElement("div"); d.textContent=t??""; return d.innerHTML; }
function pct(v){ return v==null ? "—" : (100*v).toFixed(1)+"%"; }
let recentPage = 0;
function renderEvals(){
  const all = window._evals || [], champs = window._champs || new Set();
  const PER = 10, nPages = Math.max(1, Math.ceil(all.length/PER));
  recentPage = Math.min(Math.max(0, recentPage), nPages-1);
  const body = all.slice(recentPage*PER, recentPage*PER+PER).map((r,j)=>{
    const gi = recentPage*PER + j;
    const col = champs.has(r.name) ? "#ffd33d" : (r.lme!=null && r.lme<-0.05) ? "var(--green)" : "var(--fg)";
    const memTag = (r.lme!=null) ? (r.lme < -0.05 ? "uses-ctx" : r.lme > 0.05 ? "degr" : "flat") : "";
    const tags = [champs.has(r.name)?"champion":"", r.topo==="loop"?"loop":"", r.ext&&r.ext!=="none"?r.ext:"", r.stack?"⊗attn":"", r.synth?"L2":"", r.pruned?"pruned":"", memTag].filter(Boolean).join(" ");
    const extra = [r.val!=null?`loss ${r.val.toFixed(3)}`:"", r.lme!=null?`Δ${r.lme.toFixed(3)}`:"", r.cost!=null?`c${r.cost}`:""].filter(Boolean).join(" ");
    return `<div class="row erow" onclick="showSheet(${gi})"><span style="color:${col}"><b>${pct(r.skill)}</b></span><span class="ops">${esc(r.name)} ${esc(r.ops)}</span><span style="color:var(--dim)">${esc(tags)}${extra?" · "+esc(extra):""}</span></div>`;
  }).join("") || "<div class='small'>no evals yet</div>";
  const pager = all.length > PER
    ? `<div class="pager"><button onclick="pageRecent(-1)" ${recentPage<=0?"disabled":""}>◀ newer</button>`
      + `<span>page ${recentPage+1}/${nPages} · ${all.length} evals</span>`
      + `<button onclick="pageRecent(1)" ${recentPage>=nPages-1?"disabled":""}>older ▶</button></div>`
    : "";
  document.getElementById("evals").innerHTML = pager + body;
}
function pageRecent(delta){ recentPage += delta; renderEvals(); }
function showSheet(i){
  const r = (window._evals||[])[i]; if(!r) return;
  const yn = v => v===true ? "yes" : v===false ? "no" : v;
  const F = [
    ["net", r.name], ["ops", r.ops], ["skill", r.skill!=null ? (100*r.skill).toFixed(2)+"%" : null],
    ["loss (cross-entropy)", r.val], ["perplexity", r.ppl], ["level / corpus", r.corpus], ["task kind", r.kind],
    ["window", r.window], ["topology", r.topo], ["external memory", r.ext], ["attention stack", r.stack],
    ["synth op (L2)", r.synth], ["context Δ (late−early)", r.lme], ["val σ (seed noise)", r.val_std],
    ["pos loss", r.pos_loss], ["cost", r.cost], ["steps/sec", r.st_per_s], ["pruned", r.pruned],
    ["d (width)", r.d], ["layers", r.n_layer], ["train steps", r.steps], ["seed", r.seed],
    ["params", r.params], ["score (−val)", r.score],
    ["evaluated", r.ts ? new Date(r.ts*1000).toLocaleString() : null],
  ];
  const rows = F.filter(([k,v]) => v!=null && v!=="").map(([k,v]) =>
    `<div class="srow"><span class="sk">${esc(k)}</span><span class="sv">${esc(yn(v))}</span></div>`).join("");
  document.getElementById("sheetbody").innerHTML =
    `<div class="shh">${esc(r.name)}</div>` + rows + `<button class="sclose" onclick="closeSheet()">close</button>`;
  document.getElementById("sheet").style.display = "flex";
}
function closeSheet(e){ if(!e || e.target.id==="sheet") document.getElementById("sheet").style.display="none"; }
async function load(){
  let d;
  try { d = await (await fetch(SRC + "?t=" + Date.now(), {cache:"no-store"})).json(); }
  catch(e){ document.getElementById("upd").textContent = "fetch failed"; return; }
  const age = Date.now()/1000 - d.ts;
  const upd = document.getElementById("upd");
  upd.textContent = "data " + ago(age) + " old";
  upd.className = "pill" + (age > 900 ? " stale" : "");
  const s = d.search || {};
  const champ = s.champion ?? s.best_val;                       // raw loss (cross-entropy) of the best net
  document.getElementById("best").textContent = pct(s.best_skill);             // SKILL replaces raw val
  const lv = s.level;
  document.getElementById("gate").textContent = lv ? `${lv.kind||""} ${lv.difficulty??0}`.trim() : "—";
  document.getElementById("ppl").textContent  = champ?.toFixed(4) ?? "—";       // raw loss, for reference
  document.getElementById("phase").textContent = s.phase ? `phase: ${s.phase}` : "";
  document.getElementById("thr").textContent =
    `σ ${s.sigma?.toFixed(4)}   d${s.d}/b${s.batch}/${s.steps} steps   ${(d.cluster?.workers||[]).length} GPU(s)`;
  const bn = document.getElementById("banner");
  if (s.plateau) { bn.style.display=""; bn.textContent = `■ ARCHITECTURE PLATEAU — ${s.plateau.champion} (val ${s.plateau.val}, ppl ${s.plateau.ppl}) is final · ready for scale training`; }
  else if (s.winners?.length) { bn.style.display=""; bn.textContent = "★ CONFIRMED WIN: " + s.winners.map(w=>`${w.name} mean ${w.val_mean}`).join("  "); }
  else { bn.style.display="none"; }
  // sparkline — X = wall-clock time, Y = SKILL (1 − loss/ln V; difficulty-normalized, higher is better,
  // 1 = perfect prediction, 0 = uniform-random). Two lines: running BEST (max) and population MEAN,
  // over one faint dot per eval.
  const c = document.getElementById("spark"), x = c.getContext("2d");
  x.clearRect(0,0,c.width,c.height);
  const H = (d.history||[]).filter(p=>p.skill!=null && p.val<9 && p.ts);
  if (H.length > 1){
    const ts = H.map(p=>p.ts), t0 = Math.min(...ts), t1 = Math.max(...ts);
    const ks = H.map(p=>p.skill), lo = Math.max(0,Math.min(...ks)-.03), hi = Math.min(1,Math.max(...ks)+.03);
    const X = i => 8 + ((ts[i]-t0)/Math.max(t1-t0,1e-9))*(c.width-16);
    const Y = v => c.height-10-((v-lo)/Math.max(hi-lo,1e-9))*(c.height-20);   // higher skill = higher up
    x.fillStyle="rgba(88,166,255,.5)";
    H.forEach((p,i)=>{ x.beginPath(); x.arc(X(i),Y(p.skill),2,0,7); x.fill(); });  // one dot per eval
    const win = Math.max(3, Math.round(H.length*0.15));    // MEAN — trailing-window population trend
    x.strokeStyle="#d2a8ff"; x.lineWidth=2; x.beginPath();
    H.forEach((p,i)=>{ const a=Math.max(0,i-win+1); let s=0; for(let j=a;j<=i;j++) s+=H[j].skill;
      const m=s/(i-a+1); i?x.lineTo(X(i),Y(m)):x.moveTo(X(0),Y(m)); }); x.stroke();
    let rb = -Infinity; x.strokeStyle="#3fb950"; x.lineWidth=2; x.beginPath();   // BEST — running-MAX staircase
    H.forEach((p,i)=>{ rb=Math.max(rb,p.skill); i?x.lineTo(X(i),Y(rb)):x.moveTo(X(0),Y(rb)); }); x.stroke();
    x.lineWidth=1;
  }
  document.getElementById("sparkleg").innerHTML =
    `<span style="color:#3fb950">▬</span> best skill &nbsp;&nbsp; `+
    `<span style="color:#d2a8ff">▬</span> mean skill &nbsp;&nbsp; `+
    `<span style="color:var(--dim)">● eval · 1 = perfect, 0 = random · x = time</span>`;
  // compounding engine — archive coverage + learned motif library
  const cp = d.compounding || {};
  const cpEl = document.getElementById("compound");
  if (cp.niches!=null || cp.motifs!=null){
    const ab = (cp.archive_best||[]).map(v=> (typeof v==="number"? v.toFixed(3): v)).join(" · ");
    const sp = cp.archive_spread;
    const spread = sp ? ` &nbsp;<span style="color:var(--dim)">spread ${sp.min}…${sp.med}…${sp.max}</span>` : "";
    cpEl.innerHTML = `archive: <b>${cp.niches??0}</b> niches filled${ab?` &nbsp;best ${ab}`:""}${spread}<br>`+
      `library: <b>${cp.motifs??0}</b> motifs${cp.motifs_champion?` (${cp.motifs_champion} from champions)`:""}`;
  } else { cpEl.textContent = "warming up…"; }
  // evals — paginated list (10/page); tap a row for the full data sheet (renderEvals/showSheet, top of script)
  window._evals = s.recent || [];
  window._champs = new Set((s.winners||[]).map(w=>w.name));
  renderEvals();
  // workers
  document.getElementById("workers").innerHTML = (d.cluster?.workers||[]).map(w=>{
    const off = w.age > 60;
    const sc = off ? "stat-off" : (w.status==="ready"||w.status==="running") ? "stat-ready" : "stat-warn";
    const st = off ? `OFFLINE ${ago(w.age)} — last: ${w.status}` : w.status;
    const tcol = w.temp>=83?"var(--red)":w.temp>=75?"var(--amber)":"var(--dim)";
    const stepping = (w.step!=null && w.steps);                 // training underway (progress reported)
    const stepPct = stepping ? Math.min(100, 100*w.step/w.steps) : 0;
    const netLine = stepping
      ? `<div class="small" style="margin-top:3px">net <b style="color:var(--amber)">${esc(w.net||"?")}</b>${w.sps!=null?` · ${w.sps} st/s`:""} · step ${w.step}/${w.steps}</div>
         <div class="bar" style="height:4px"><i style="width:${stepPct}%;background:var(--amber)"></i></div>`
      : (w.job && !off)                                          // has a job but no step yet = booting the eval (torch import / model build / CUDA ctx)
        ? `<div class="small" style="margin-top:3px;color:var(--amber)">⟳ initializing${w.net?` <b>${esc(w.net)}</b>`:""} — loading model &amp; data…</div>`
        : `<div class="small" style="margin-top:3px;color:var(--dim)">idle — no net being evaluated</div>`;
    return `<div class="wk"><div class="nm">${esc(w.id)} <span class="${sc}">● ${esc(st)}</span></div>
      <div class="bar"><i style="width:${w.util||0}%"></i></div>
      <div class="small">gpu ${w.util??"—"}% · <span style="color:${tcol}">${w.temp??"—"}°C</span> · ${w.mem_used??"—"}/${w.mem_total??"—"} MiB · ${esc((w.caps||[]).join(","))}${w.job?" · job "+esc(w.job):""}</div>
      ${netLine}</div>`;
  }).join("") + `<div class="small">queue ${d.cluster?.queued??0} · running ${d.cluster?.running??0} · done ${d.cluster?.done??0}</div>`;
}
load(); setInterval(load, 30000);
</script>
</body>
</html>
