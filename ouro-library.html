<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Ouroborus — library</title>
<style>
  :root { --bg:#0d1117; --bg2:#161b22; --fg:#c9d1d9; --dim:#8b949e; --grid:#21262d;
          --blue:#58a6ff; --green:#3fb950; --amber:#e3b341; --red:#f85149; --gold:#ffd33d; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--fg); font:14px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; padding:14px; max-width:560px; margin:0 auto; }
  h1 { font-size:15px; letter-spacing:.06em; color:var(--dim); display:flex; justify-content:space-between; align-items:center; }
  .pill { font-size:11px; padding:2px 8px; border-radius:10px; background:var(--bg2); border:1px solid var(--grid); }
  .pill.stale { color:var(--red); border-color:var(--red); }
  .card { background:var(--bg2); border:1px solid var(--grid); border-radius:10px; padding:12px; margin-top:12px; }
  .nav { display:flex; gap:6px; margin-top:10px; }
  .nav a { flex:1; text-align:center; text-decoration:none; background:var(--bg2); color:var(--dim); border:1px solid var(--grid); border-radius:8px; padding:7px; font-size:12px; }
  .nav a.active { color:var(--fg); border-color:var(--blue); }
  .l { color:var(--dim); font-size:11px; letter-spacing:.08em; }
  .counts { display:flex; gap:10px; margin-top:4px; }
  .counts div { flex:1; text-align:center; }
  .counts .v { font-size:22px; font-weight:bold; }
  .counts .v.done { color:var(--green); }
  .counts .v.pend { color:var(--dim); }
  .counts .lbl { font-size:10px; color:var(--dim); letter-spacing:.06em; }
  input.search { width:100%; background:var(--bg); color:var(--fg); border:1px solid var(--grid); border-radius:8px; padding:9px 10px; font:inherit; font-size:13px; margin-top:10px; }
  input.search:focus { outline:none; border-color:var(--blue); }
  .chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
  .chip { background:var(--bg); color:var(--dim); border:1px solid var(--grid); border-radius:14px; padding:4px 10px; font:inherit; font-size:11px; cursor:pointer; white-space:nowrap; }
  .chip.active { color:var(--fg); border-color:var(--blue); background:var(--bg2); }
  .chip .ct { opacity:.55; margin-left:4px; }
  .seg { display:flex; gap:6px; margin-top:10px; }
  .seg button { flex:1; background:var(--bg); color:var(--dim); border:1px solid var(--grid); border-radius:8px; padding:7px; font:inherit; font-size:12px; cursor:pointer; }
  .seg button.active { color:var(--fg); border-color:var(--blue); }
  .showing { font-size:11px; color:var(--dim); margin-top:10px; }
  .erow { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--grid); font-size:12.5px; }
  .erow:last-child { border-bottom:none; }
  .erow .skill { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .erow .skill .win { color:var(--dim); font-size:10.5px; margin-left:5px; }
  .erow .skill .orig { color:var(--dim); font-size:10px; opacity:.7; }
  .tag { font-size:10px; padding:2px 7px; border-radius:10px; border:1px solid; white-space:nowrap; flex-shrink:0; }
  .badge { font-size:10px; padding:2px 7px; border-radius:10px; white-space:nowrap; flex-shrink:0; }
  .badge.done { color:var(--green); border:1px solid var(--green); }
  .badge.pending { color:var(--dim); border:1px solid var(--grid); }
  .more { width:100%; background:var(--bg); color:var(--fg); border:1px solid var(--grid); border-radius:8px; padding:9px; font:inherit; font-size:12px; cursor:pointer; margin-top:10px; }
  .empty { color:var(--dim); font-size:12px; text-align:center; padding:20px 0; }
  footer { color:var(--grid); font-size:10px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<h1>OUROBORUS · LIBRARY <span id="upd" class="pill">loading…</span></h1>
<div class="nav">
  <a href="ouro-overhaul.html">Overview</a>
  <a href="ouro-library.html" class="active">Library</a>
  <a href="ouro-core.html">Core</a>
</div>

<div class="card">
  <div class="l">EXPERTS</div>
  <div class="counts">
    <div><div class="v done" id="cDone">—</div><div class="lbl">DONE</div></div>
    <div><div class="v pend" id="cPend">—</div><div class="lbl">PENDING</div></div>
    <div><div class="v" id="cTotal">—</div><div class="lbl">TOTAL</div></div>
  </div>
  <input id="search" class="search" type="text" placeholder="search skill / field…" autocomplete="off">
  <div class="seg" id="statusSeg">
    <button data-st="all" class="active">all</button>
    <button data-st="done">done</button>
    <button data-st="pending">pending</button>
  </div>
  <div class="chips" id="fieldChips"></div>
</div>

<div class="card">
  <div class="showing" id="showing">—</div>
  <div id="rows"></div>
  <button id="more" class="more" style="display:none">show more</button>
</div>

<footer><span id="pagever">v1 · library.json · fields color-tagged · client filter+search</span></footer>
<script>
const RAW = "https://raw.githubusercontent.com/gabe9230/gabe9230.github.io/data/library.json";  // ~2min fallback (no realtime relay for this large payload)
const PAGE = 60;           // rows rendered per "page"; "show more" extends the cap
let DATA = [];             // full library.json
let fStatus = "all";
let fField = null;         // active field filter (null = all)
let fSearch = "";
let visCap = PAGE;
let dataTs = null;

function ago(s){ return s<90 ? Math.round(s)+"s" : s<5400 ? Math.round(s/60)+"m" : Math.round(s/3600)+"h"; }
function esc(t){ const d=document.createElement("div"); d.textContent=t??""; return d.innerHTML; }

// Stable color per field — hash the field name into a hue so the same field always reads the same.
function fieldColor(f){
  let h = 0; const s = String(f||"");
  for (let i=0;i<s.length;i++){ h = (h*31 + s.charCodeAt(i)) >>> 0; }
  const hue = h % 360;
  return `hsl(${hue} 55% 62%)`;
}

function distinctFields(){
  const m = new Map();
  for (const r of DATA){ const f = r.field || "—"; m.set(f, (m.get(f)||0)+1); }
  return [...m.entries()].sort((a,b)=> b[1]-a[1] || String(a[0]).localeCompare(String(b[0])));
}

function applyFilter(){
  const q = fSearch.trim().toLowerCase();
  return DATA.filter(r=>{
    if (fStatus!=="all" && (r.status||"") !== fStatus) return false;
    if (fField!=null && (r.field||"—") !== fField) return false;
    if (q){
      const hay = ((r.skill||"") + " " + (r.field||"")).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function renderChips(){
  const el = document.getElementById("fieldChips");
  const fields = distinctFields();
  let html = `<div class="chip${fField==null?" active":""}" data-f="">all fields <span class="ct">${DATA.length}</span></div>`;
  html += fields.map(([f,n])=>{
    const c = fieldColor(f);
    const active = fField===f;
    return `<div class="chip${active?" active":""}" data-f="${esc(f)}" style="${active?`border-color:${c};color:${c}`:""}">`
      + `<span style="color:${c}">&#9679;</span> ${esc(f)} <span class="ct">${n}</span></div>`;
  }).join("");
  el.innerHTML = html;
  el.querySelectorAll(".chip").forEach(ch=> ch.onclick = ()=>{
    const f = ch.getAttribute("data-f");
    fField = (f==="") ? null : f;
    visCap = PAGE; renderRows();
  });
}

function renderCounts(){
  let done=0, pend=0;
  for (const r of DATA){ if ((r.status||"")==="done") done++; else pend++; }
  document.getElementById("cDone").textContent = done.toLocaleString();
  document.getElementById("cPend").textContent = pend.toLocaleString();
  document.getElementById("cTotal").textContent = DATA.length.toLocaleString();
}

function renderRows(){
  const filtered = applyFilter();
  const total = filtered.length;
  const slice = filtered.slice(0, visCap);
  const el = document.getElementById("rows");
  if (!total){
    el.innerHTML = `<div class="empty">no experts match</div>`;
    document.getElementById("showing").textContent = `showing 0 of ${DATA.length}`;
    document.getElementById("more").style.display = "none";
    return;
  }
  el.innerHTML = slice.map(r=>{
    const f = r.field || "—";
    const c = fieldColor(f);
    const st = (r.status||"")==="done" ? "done" : "pending";
    const win = r.window!=null ? `<span class="win">w${esc(r.window)}</span>` : "";
    const orig = r.origin ? ` <span class="orig">· ${esc(r.origin)}</span>` : "";
    return `<div class="erow">`
      + `<span class="skill"><b>${esc(r.skill||r.id||"—")}</b>${win}${orig}</span>`
      + `<span class="tag" style="color:${c};border-color:${c}">${esc(f)}</span>`
      + `<span class="badge ${st}">${st}</span>`
      + `</div>`;
  }).join("");
  document.getElementById("showing").textContent =
    `showing ${Math.min(visCap, total).toLocaleString()} of ${total.toLocaleString()}`
    + (total!==DATA.length ? ` (filtered from ${DATA.length.toLocaleString()})` : "");
  const more = document.getElementById("more");
  if (total > visCap){ more.style.display=""; more.textContent = `show more (${(total-visCap).toLocaleString()} hidden)`; }
  else more.style.display="none";
}

function renderAll(){
  renderCounts();
  renderChips();
  renderRows();
}

async function load(){
  let arr;
  try {
    const r = await fetch(RAW + "?t=" + Date.now(), {cache:"no-store"});
    arr = await r.json();
  } catch(e){
    document.getElementById("upd").textContent = "fetch failed";
    document.getElementById("upd").className = "pill stale";
    return;
  }
  if (!Array.isArray(arr)){
    document.getElementById("upd").textContent = "bad data";
    document.getElementById("upd").className = "pill stale";
    return;
  }
  DATA = arr;
  dataTs = Date.now()/1000;
  document.getElementById("upd").textContent = DATA.length.toLocaleString() + " experts";
  document.getElementById("upd").className = "pill";
  renderAll();
}

document.getElementById("search").addEventListener("input", e=>{
  fSearch = e.target.value || ""; visCap = PAGE; renderRows();
});
document.querySelectorAll("#statusSeg button").forEach(b=> b.onclick = ()=>{
  document.querySelectorAll("#statusSeg button").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");
  fStatus = b.getAttribute("data-st"); visCap = PAGE; renderRows();
});
document.getElementById("more").onclick = ()=>{ visCap += PAGE; renderRows(); };

load(); setInterval(load, 20000);   // refresh every ~20s (library.json republishes ~every 2min)
</script>
</body>
</html>
